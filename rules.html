<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📜 小赫家族法典</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', serif;
      background: #0f0e17;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* Header */
    .header {
      background: linear-gradient(160deg, #1a1200 0%, #2d2000 60%, #1a1200 100%);
      border-bottom: 3px solid #c9a84c;
      padding: 28px 20px 20px;
      text-align: center;
      position: relative;
    }
    .header::before, .header::after {
      content: '✦';
      position: absolute;
      top: 50%; transform: translateY(-50%);
      font-size: 1.2rem;
      color: #c9a84c;
    }
    .header::before { left: 16px; }
    .header::after  { right: 16px; }

    .header-badge {
      display: inline-block;
      background: #c9a84c;
      color: #1a1200;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 3px 12px;
      border-radius: 20px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 1.9rem;
      font-weight: 900;
      color: #f5e6c0;
      text-shadow: 0 2px 8px rgba(201,168,76,0.4);
      letter-spacing: 3px;
    }
    .header .sub {
      color: #a08040;
      font-size: 0.85rem;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    /* Chapter header */
    .chapter {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 14px 0;
    }
    .chapter-line { flex: 1; height: 1px; background: currentColor; opacity: 0.3; }
    .chapter-title {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: 2px;
      padding: 6px 18px;
      border-radius: 20px;
      border: 2px solid currentColor;
      white-space: nowrap;
    }
    .chapter.reward  { color: #f5c842; }
    .chapter.penalty { color: #e05a5a; }

    /* Rule card */
    .rule-card {
      margin: 10px 14px 0;
      background: #1a1900;
      border-radius: 14px;
      padding: 16px 18px;
      border: 1px solid #3a3200;
      position: relative;
      overflow: hidden;
    }
    .rule-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
    }
    .rule-card.reward::before  { background: #f5c842; }
    .rule-card.penalty::before { background: #e05a5a; }

    .rule-article {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .rule-card.reward  .rule-article { color: #f5c842; }
    .rule-card.penalty .rule-article { color: #e05a5a; }

    .rule-title {
      font-size: 1.05rem;
      font-weight: 800;
      color: #f5e6c0;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .rule-desc {
      font-size: 0.88rem;
      color: #9a8a6a;
      line-height: 1.6;
    }
    .rule-result {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .rule-card.reward  .rule-result { background: rgba(245,200,66,0.15); color: #f5c842; }
    .rule-card.penalty .rule-result { background: rgba(224,90,90,0.15); color: #e05a5a; }

    .empty-msg {
      text-align: center;
      color: #4a4030;
      font-size: 0.9rem;
      padding: 20px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 28px 0 0;
      font-size: 0.85rem;
    }
    .footer a { color: #a08040; text-decoration: none; margin: 0 12px; }

    .seal {
      text-align: center;
      margin: 28px 14px 0;
      padding: 16px;
      border: 1px dashed #3a3200;
      border-radius: 12px;
      color: #4a4030;
      font-size: 0.8rem;
      letter-spacing: 1px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-badge">家族典章</div>
  <h1>小赫家族法典</h1>
  <div class="sub" id="lastUpdated">載入中...</div>
</div>

<!-- 獎勵篇 -->
<div class="chapter reward">
  <div class="chapter-line"></div>
  <div class="chapter-title">🏆 獎勵篇</div>
  <div class="chapter-line"></div>
</div>
<div id="rewardList"></div>

<!-- 懲罰篇 -->
<div class="chapter penalty">
  <div class="chapter-line"></div>
  <div class="chapter-title">⚠️ 懲罰篇</div>
  <div class="chapter-line"></div>
</div>
<div id="penaltyList"></div>

<div class="seal" id="sealText"></div>

<div class="footer">
  <a href="index.html">← 回任務頁</a>
  <a href="dashboard.html">📊 Dashboard</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBWNtSjDKSsRco_kmrxY9BTpeUZjffZgY4",
  authDomain: "htctors-check-list.firebaseapp.com",
  projectId: "htctors-check-list",
  storageBucket: "htctors-check-list.firebasestorage.app",
  messagingSenderId: "443973354141",
  appId: "1:443973354141:web:4769604bfdfca42d1d4a74"
});
const db = firebase.firestore();

const DEFAULT_RULES = [
  { id:'r1', type:'reward',  title:'當週全勤',        desc:'週一到週五每天所有任務全部完成。', result:'週末加 1 小時 3C 時間' },
  { id:'r2', type:'reward',  title:'自動整理書包不需提醒', desc:'爸媽沒有提醒，自己主動整理好書包。',  result:'隔天可晚睡 15 分鐘' },
  { id:'r3', type:'penalty', title:'聯絡簿未簽名被老師發現', desc:'因為沒有主動拿出聯絡簿，導致老師在學校發現未簽名。', result:'當天無 3C 時間' },
  { id:'r4', type:'penalty', title:'說謊隱瞞事情',    desc:'發生事情沒有主動告知爸媽，或說謊掩飾。', result:'3C 時間扣 30 分鐘' },
];

function getArticleLabel(type, index) {
  const nums = ['一','二','三','四','五','六','七','八','九','十',
                 '十一','十二','十三','十四','十五'];
  return `第${nums[index] || (index+1)}條`;
}

function renderRules(rules) {
  const rewards  = rules.filter(r => r.type === 'reward');
  const penalties = rules.filter(r => r.type === 'penalty');

  const rewardEl  = document.getElementById('rewardList');
  const penaltyEl = document.getElementById('penaltyList');

  rewardEl.innerHTML  = rewards.length  ? '' : '<div class="empty-msg">尚無獎勵規則</div>';
  penaltyEl.innerHTML = penalties.length ? '' : '<div class="empty-msg">尚無懲罰規則</div>';

  rewards.forEach((rule, i) => {
    rewardEl.innerHTML += `
      <div class="rule-card reward">
        <div class="rule-article">${getArticleLabel('reward', i)}</div>
        <div class="rule-title">${rule.title}</div>
        <div class="rule-desc">${rule.desc}</div>
        <div class="rule-result">▶ ${rule.result}</div>
      </div>`;
  });

  penalties.forEach((rule, i) => {
    penaltyEl.innerHTML += `
      <div class="rule-card penalty">
        <div class="rule-article">${getArticleLabel('penalty', i)}</div>
        <div class="rule-title">${rule.title}</div>
        <div class="rule-desc">${rule.desc}</div>
        <div class="rule-result">▶ ${rule.result}</div>
      </div>`;
  });

  const now = new Date();
  const d = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 制定`;
  document.getElementById('lastUpdated').textContent = d;
  document.getElementById('sealText').textContent =
    `本法典由家長制定，小赫應遵守並理解其精神。\n如有疑義，以爸媽解釋為準。`;
}

async function init() {
  const doc = await db.collection('config').doc('rules').get();
  let rules = (doc.exists && doc.data().rules?.length) ? doc.data().rules : DEFAULT_RULES;
  if (!doc.exists || !doc.data().rules?.length) {
    await db.collection('config').doc('rules').set({ rules: DEFAULT_RULES });
  }
  renderRules(rules);

  // Real-time updates
  db.collection('config').doc('rules').onSnapshot(snap => {
    if (snap.exists && snap.data().rules) renderRules(snap.data().rules);
  });
}

init();
</script>
</body>
</html>
